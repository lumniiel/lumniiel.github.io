<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumniel</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

<div class="page">

    <div class="layout">

        <!-- SINISTRA -->
        <aside class="left-frame">

            <section class="wolf panel"></section>
            <section class="menu panel"></section>
            <section class="moon panel"></section>
            <section class="news panel"></section>
            <section class="player panel"></section>
            <section class="status panel"></section>

        </aside>

        <!-- CENTRO -->
        <main class="center-frame">

            <section class="hero panel"></section>
            <section class="intro panel"></section>

            <section class="divider"></section>

            <div class="top-grid">

                <section class="about panel"></section>
                <section class="currently panel"></section>

            </div>

            <section class="interests panel"></section>

            <section class="updates panel"></section>

        </main>

        <!-- DESTRA -->
        <aside class="right-frame">

            <section class="bat panel"></section>
            <section class="extra panel"></section>
            <section class="links panel"></section>
            <section class="buttons panel"></section>
            <section class="credits panel"></section>

        </aside>

    </div>

</div>

</body>
</html>
